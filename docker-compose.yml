# CoworkingOS + SereniBase (backend-only stack)
# REST API :8080 | JWT :8081 | Coworking BFF :3001 | Postgres :5432

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: serenibase
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d serenibase"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - coworking-net

  jwt-provider:
    build:
      context: ./backend/jwt-service
    environment:
      JWT_SECRET: ${AUTH_JWT_SECRET:-coworkingos-dev-jwt-secret-min-32-chars-long}
      SERVER_PORT: 8081
      SERVER_HOST: 0.0.0.0
      ACCESS_TOKEN_DURATION: 15m
      REFRESH_TOKEN_DURATION: 168h
    ports:
      - "8081:8081"
    networks:
      - coworking-net

  serenibase-rest:
    build:
      context: .
      dockerfile: docker/Dockerfile.serenibase
    ports:
      - "8080:8080"
    environment:
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
      SERVER_ENV: dev
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: serenibase
      DATABASE_SSL_MODE: disable
      AUTH_URL: http://jwt-provider:8081
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-coworkingos-dev-jwt-secret-min-32-chars-long}
      OWNER_FIRST_NAME: Admin
      OWNER_LAST_NAME: User
      OWNER_EMAIL: ${OWNER_EMAIL:-admin@example.com}
      OWNER_PASSWORD: ${OWNER_PASSWORD:-Admin@123}
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001
      CORS_ALLOWED_METHODS: GET,POST,PUT,DELETE,OPTIONS,PATCH
      CORS_ALLOWED_HEADERS: Content-Type,Authorization,Accept,X-Request-ID
      CORS_ALLOW_CREDENTIALS: "true"
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      jwt-provider:
        condition: service_started
    networks:
      - coworking-net
    restart: on-failure

  coworking-api:
    build:
      context: ./backend/coworking-api
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      SERENIBASE_URL: http://serenibase-rest:8080
      OWNER_EMAIL: ${OWNER_EMAIL:-admin@example.com}
      OWNER_PASSWORD: ${OWNER_PASSWORD:-Admin@123}
      CORS_ORIGIN: http://localhost:3000,http://127.0.0.1:3000
      MANIFEST_PATH: /data/coworking-manifest.json
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-coworkingos-dev-jwt-secret-min-32-chars-long}
    volumes:
      - coworking_data:/data
    depends_on:
      serenibase-rest:
        condition: service_started
    networks:
      - coworking-net
    restart: on-failure

volumes:
  postgres_data:
  coworking_data:

networks:
  coworking-net:
    driver: bridge
